name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  go-test:
    name: go test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        go: ['1.23', '1.26']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - run: go vet ./...
      - run: go test -race -count=1 ./...

  go-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  integration:
    name: PG integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      # Linux runners ship with native Docker, no Colima quirks. Reaper
      # works here, so leave RYUK enabled (the Makefile target disables
      # it only because of Colima socket-mount limits).
      - run: go test -tags integration -count=1 ./...

  codegen-drift:
    name: codegen drift
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - name: Regenerate protobuf bindings
        run: buf generate
      - name: Regenerate GraphQL bindings
        working-directory: internal/query
        run: go run github.com/99designs/gqlgen generate
      - name: Fail if generated code drifted
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated code is out of date. Run 'make proto && make gqlgen' locally and commit the result."
            git diff --stat
            exit 1
          fi

  action-smoke:
    name: composite action smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - run: bash actions/build/smoke_test.sh

  web:
    name: web build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
