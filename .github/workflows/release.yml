# release.yml — v0.1 release pipeline (ADR 0006 D4 / D6 / D7).
#
# Triggers on a `v*.*.*` tag push. Produces:
#   - 8 cross-built binaries (agent-lens + agent-lens-hook × darwin|linux × amd64|arm64)
#   - 8 DSSE in-toto attestations (.sig) signed with the project's ed25519 key
#   - checksums.txt (sha256 over the binaries)
#   - agent-lens-public.pem (the verification key, derived from the private key
#     via `openssl pkey -pubout` so we don't need a second secret)
#   - container image at ghcr.io/dong-qiu/agent-lens:vX.Y.Z + :latest (multi-arch)
#
# Required repo secret:
#   AGENT_LENS_RELEASE_PRIVATE_KEY — PEM-encoded ed25519 private key (PKCS#8),
#   produced by `agent-lens-hook keygen` and pasted into Settings → Secrets.
#   The matching public key is derived in-workflow and shipped as a release asset.
name: Release

on:
  push:
    # `v*.*.*` matches both stable (`v0.1.0`) and RC (`v0.2.0-rc1`)
    # tags — GitHub's `*` glob matches any non-`/` character including
    # `-`, so this single pattern catches everything we want. The
    # stable-vs-prerelease distinction is enforced downstream by
    # `prerelease: ${{ contains(github.ref_name, '-rc') }}` in the gh
    # release step + tag selection in build-image. Per issue #93 Item 5.
    tags: ['v*.*.*']
  # workflow_dispatch (added per issue #93 Item 2 after v0.1.0 iterated
  # 4× on first-tag-cut): manually trigger this pipeline against any
  # branch BEFORE tagging, with --dry-run skipping GHCR push and the
  # GitHub Release create step. Lets us validate end-to-end pipeline
  # changes without burning a real tag-rebase cycle.
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — skip GHCR push + GitHub Release create (default true)'
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  # Build the Lens UI bundle once and share it with every binary job
  # via upload/download-artifact. Without this step the agent-lens
  # binaries shipped with empty internal/webui/dist (only .gitkeep),
  # so `//go:embed all:dist` produced an empty FS and `/` served the
  # dev-mode stub instead of the React app — discovered when we
  # smoke-tested the v0.1.1 release on a real arm64 Mac.
  # Pattern matches ci.yml's `web` job + release.yml's existing
  # upload/download-artifact flow for the binaries themselves.
  # The Dockerfile still builds the web bundle in its own multi-stage
  # build (working since v0.1.0) — a small duplication kept on
  # purpose so this PR doesn't disturb the working container path.
  # #93 Item 4 (v0.2) will consolidate.
  web-build:
    name: web bundle
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 7

  build-binaries:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: web-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: linux,  goarch: amd64 }
          - { goos: linux,  goarch: arm64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Download web bundle
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: internal/webui/dist

      - name: Cross-build agent-lens + agent-lens-hook
        env:
          CGO_ENABLED: '0'
          GOOS:    ${{ matrix.goos }}
          GOARCH:  ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          # -trimpath strips local filesystem paths from the binary so two
          # builds from different machines/CI runners produce byte-equal output
          # (modulo BuiltAt timestamp which lives in the *.sig predicate).
          go build -trimpath -ldflags="-s -w" \
            -o dist/agent-lens-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/agent-lens
          go build -trimpath -ldflags="-s -w" \
            -o dist/agent-lens-hook-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/agent-lens-hook

      - name: Build native sign-release helper for THIS runner
        # The cross-built binaries above can't run on the linux/amd64 runner
        # (when matrix is darwin/arm64 etc.). We need a native build of
        # agent-lens-hook to do the signing locally.
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: amd64
        run: go build -o /tmp/hook-runner ./cmd/agent-lens-hook

      - name: Stage release private key from secret
        env:
          KEY: ${{ secrets.AGENT_LENS_RELEASE_PRIVATE_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::error::AGENT_LENS_RELEASE_PRIVATE_KEY secret is missing." \
                 "Generate one with 'agent-lens-hook keygen' and add to" \
                 "Settings → Secrets → Actions."
            exit 1
          fi
          mkdir -p /tmp/keys
          printf '%s\n' "$KEY" > /tmp/keys/ed25519
          chmod 600 /tmp/keys/ed25519

      - name: Sign each binary
        run: |
          set -e
          for bin in \
              dist/agent-lens-${{ matrix.goos }}-${{ matrix.goarch }} \
              dist/agent-lens-hook-${{ matrix.goos }}-${{ matrix.goarch }}; do
            /tmp/hook-runner sign-release \
              --key /tmp/keys/ed25519 \
              --in "$bin" \
              --out "${bin}.sig"
          done
          ls -la dist/

      - name: Upload binaries + signatures
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          retention-days: 7

  build-image:
    name: container image (linux/amd64)
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        # Dispatch (any kind): single synthetic tag dispatch-<run_id> so
        # docker/build-push-action accepts the OCI tag format.
        # Final tag push (no -rc): version tag + :latest (latest follows
        # final releases only).
        # RC tag push (e.g. v0.2.0-rc1): version tag only — :latest must
        # NOT advance to a prerelease (matches the gh release prerelease:
        # field below; #93 Item 5).
        run: |
          set -e
          IMAGE=ghcr.io/dong-qiu/agent-lens
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAGS="$IMAGE:dispatch-${{ github.run_id }}"
          elif [[ "${{ github.ref_name }}" == *-rc* ]]; then
            TAGS="$IMAGE:${{ github.ref_name }}"
          else
            TAGS="$IMAGE:${{ github.ref_name }}"$'\n'"$IMAGE:latest"
          fi
          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Computed image tags:"
          echo "$TAGS"

      - name: Build + push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/compose/Dockerfile.server
          # v0.1: linux/amd64 only. linux/arm64 via QEMU emulation
          # exhausted GitHub Actions' 6-hour job timeout on the web-build
          # stage (vite + Monaco's 3.8 MB chunk in emulated arm64 = many
          # hours). arm64 Mac users run amd64 images via Docker Desktop /
          # colima at ~2x perf penalty — acceptable for v0.1; v0.1.x can
          # split web-build into a separate amd64 job + multi-arch
          # docker build using the artifact, OR move to native arm64
          # runners (ubuntu-24.04-arm).
          # Binaries are still cross-built for darwin/linux × amd64/arm64
          # in build-binaries; arm64 users have a native binary path.
          platforms: linux/amd64
          # push only on real tag push, OR explicit non-dry-run
          # workflow_dispatch. Dry-run builds the image but skips
          # registry write — lets us validate pipeline changes without
          # polluting :latest.
          push: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false) }}
          tags: ${{ steps.tags.outputs.tags }}
          # Container-image cosign signing deferred to v0.2 (different
          # signing path than the release-artifact DSSE attestations
          # signed in build-binaries above).

  release:
    name: gh release
    needs: [build-binaries, build-image]
    # Skip on dry-run workflow_dispatch — binaries + signatures are
    # still uploaded as workflow run artifacts (build-binaries job),
    # so reviewers can pull them for verify; we just don't create a
    # public GitHub Release.
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          # `binaries-darwin-amd64` etc. are separate dirs by default;
          # merge-multiple flattens them into one dir so we can checksum
          # and upload uniformly.
          merge-multiple: true

      - name: Compute checksums.txt over the unsigned binaries
        run: |
          cd artifacts
          # Hash only the binaries themselves; .sig files have their own
          # internal sha256 in the in-toto subject — checksums.txt is
          # a quick out-of-band integrity check for users who don't want
          # to verify the DSSE envelope.
          # The single `agent-lens-*` glob already matches both
          # `agent-lens-darwin-*` and `agent-lens-hook-darwin-*` etc.;
          # an earlier release.yml had `agent-lens-* agent-lens-hook-*`
          # which double-listed every hook binary in v0.1.0's
          # checksums.txt. Single glob avoids that.
          sha256sum agent-lens-* \
            | grep -v '\.sig$' \
            | sort \
            > checksums.txt
          echo "=== checksums.txt ==="
          cat checksums.txt

      - name: Derive agent-lens-public.pem from the private secret
        env:
          KEY: ${{ secrets.AGENT_LENS_RELEASE_PRIVATE_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::error::AGENT_LENS_RELEASE_PRIVATE_KEY secret missing"
            exit 1
          fi
          # Stage privkey in a tmpfile (mode 600, deleted at job end), then
          # extract the public part with openssl. ed25519 PEM is plain
          # PKCS#8 / SPKI which openssl handles natively.
          umask 077
          PRIV=$(mktemp)
          printf '%s\n' "$KEY" > "$PRIV"
          openssl pkey -in "$PRIV" -pubout -out artifacts/agent-lens-public.pem
          rm -f "$PRIV"
          echo "=== agent-lens-public.pem ==="
          cat artifacts/agent-lens-public.pem

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          # Tags matching `v*.*.*-rc*` (e.g. v0.2.0-rc1) ship as
          # prerelease — `releases/latest/...` URLs and ghcr.io :latest
          # skip them. Stable tags (v*.*.*) ship as latest.
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/agent-lens-*
            artifacts/checksums.txt
            artifacts/agent-lens-public.pem
