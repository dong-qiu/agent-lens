scalar Time
scalar JSON

type Event {
  id: ID!
  ts: Time!
  sessionId: String!
  turnId: String
  actor: Actor!
  kind: EventKind!
  payload: JSON
  parents: [ID!]!
  refs: [ID!]!
  hash: String!
  prevHash: String
  """All links touching this event in either direction (from/to)."""
  links: [Link!]!
  """
  Token usage of the assistant message that derived this event. Present
  only on events derived from a real-usage assistant message (per ADR
  0002 D3, `<synthetic>` placeholders and all-zero messages return
  null). The carrier event per message is the first text block, then
  the first thinking block, then a synthesized stub — so usage never
  double-counts in turn / session aggregation.
  """
  usage: TokenUsage
  """
  Reason the model stopped on the message that derived this event:
  `end_turn`, `tool_use`, `stop_sequence`, etc. Sourced verbatim from
  the Anthropic transcript `message.stop_reason` field.
  """
  stopReason: String
}

"""
Vendor-neutral token-counting shape per ADR 0002 D2. Per-event usage
exposes vendor / model / service_tier of the originating message.

When returned as `Session.totalUsage`, only numeric counters aggregate
meaningfully; vendor / model / service_tier carry best-effort summary
values (see Session.totalUsage docs). Cache and server-tool fields are
optional because some vendors (e.g. OpenAI) don't have a directly
comparable concept.
"""
type TokenUsage {
  vendor: String!
  model: String!
  serviceTier: String
  inputTokens: Int!
  outputTokens: Int!
  cacheReadTokens: Int
  cacheWrite5mTokens: Int
  cacheWrite1hTokens: Int
  webSearchCalls: Int
  webFetchCalls: Int
}

type Link {
  fromEvent: ID!
  toEvent: ID!
  relation: String!
  confidence: Float!
  inferredBy: String!
}

type Actor {
  type: ActorType!
  id: String!
  model: String
}

enum ActorType {
  HUMAN
  AGENT
  SYSTEM
}

enum EventKind {
  PROMPT
  THOUGHT
  TOOL_CALL
  TOOL_RESULT
  CODE_CHANGE
  COMMIT
  PR
  TEST_RUN
  BUILD
  DEPLOY
  REVIEW
  DECISION
  PUSH
}

"""Aggregated view of a session: id plus first/last activity and event count."""
type Session {
  id: String!
  firstEventAt: Time!
  lastEventAt: Time!
  eventCount: Int!
  """
  Aggregate token usage across every event in this session that has
  `usage`. Numeric counters (input/output/cache_read/cache_write) are
  exact sums. Non-numeric fields summarize: `vendor` is the dominant
  value (or empty if mixed); `model` is empty when more than one model
  appeared (multi-model sessions), else the single model id;
  `serviceTier` likewise. Returns null when no event in the session
  carries usage.
  """
  totalUsage: TokenUsage
}

type Query {
  """Look up a single event by ID."""
  event(id: ID!): Event

  """List events in append order for a session, up to limit."""
  events(sessionId: String!, limit: Int = 100): [Event!]!

  """Hash of the latest event in a session, or empty string if unknown."""
  sessionHead(sessionId: String!): String!

  """
  List sessions ordered by lastEventAt DESC (most recent first), up to
  limit. If `since` is provided, only sessions with lastEventAt >= since
  are returned.
  """
  sessions(limit: Int = 50, since: Time): [Session!]!

  """
  Return events from sessionId plus events from any session reachable
  via the linker's emitted `links` (transitively, up to `depth` hops).
  Per-session result is capped at `perSessionLimit`. depth=0 is
  equivalent to events(sessionId, perSessionLimit). depth is clamped
  to [0, 3] server-side to bound query cost.
  """
  linkedEvents(sessionId: String!, depth: Int = 1, perSessionLimit: Int = 200): [Event!]!
}
